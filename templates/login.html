{% extends "layout.html" %} {% block title %}Sign In{% endblock %} {% block content %}
<form action="/login" method="POST" class="container py-4">
  <div class="row g-3">
    <div class="col-12">
      <input
        type="email"
        class="form-control"
        placeholder="Email"
        aria-label="Email"
        name="email"
        required
      />
    </div>
    <div class="col-12">
      <input
        type="password"
        class="form-control"
        placeholder="Password"
        aria-label="Password"
        name="password"
        required
      />
    </div>
    <div class="col-12 d-grid">
      <button type="submit" class="btn btn-primary">Sign In</button>
    </div>
  </div>
  <a href="/register">No account yet? Register here</a>
</form>
{% endblock %}
