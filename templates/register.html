    <div class="col-12">
      <input
        type="email"
        class="form-control"
        placeholder="E-Mail"
        aria-label="E-Mail"
        name="email"
        required
      />
    </div>
    <div class="col-12">
      <input
        type="password"
        class="form-control"
        placeholder="Passwort"
        aria-label="Passwort"
        name="password"
        required
      />
    </div>
    <div class="col-12">
      <input
        type="password"
        class="form-control"
        placeholder="Passwort bestätigen"
        aria-label="Passwort bestätigen"
        name="confirm_password"
        required
      />
    </div>
    <div class="col-12 d-grid">
      <button type="submit" class="btn btn-primary">Registrieren</button>
    </div>
  </div>
  <a href="/login">Schon ein Konto? Hier anmelden!</a>
